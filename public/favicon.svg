<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </linearGradient>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB000" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FF7A00" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <!-- T crossbar -->
  <rect x="4" y="9" width="40" height="9" rx="4" fill="url(#tg)"/>
  <!-- T stem -->
  <rect x="19" y="18" width="10" height="23" rx="4" fill="url(#tg)"/>
  <!-- Speed / flow accent lines -->
  <rect x="29" y="29" width="13" height="2.5" rx="1.25" fill="url(#ag)"/>
  <rect x="31" y="34" width="9" height="2" rx="1" fill="url(#ag)" opacity="0.6"/>
